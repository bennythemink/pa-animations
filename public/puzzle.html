<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Agency – Puzzle Drop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Lateef:wght@200&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        background: #f0efea;
      }

      body {
        overflow: hidden; /* locked during animation; unlocked by JS when P/A begin moving */
      }

      .stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        z-index: 9999; /* always above scrollable content */
        background: #f0efea; /* opaque backdrop — acts as loader */
        pointer-events: none;
      }

      #puzzle {
        position: relative;
      }

      .tile {
        position: absolute;
        will-change: transform, opacity;
      }

      .tile img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: fill;
        pointer-events: none;
      }

      /* ── Logo link ────────────────────────────────────────────────────── */
      .tile.logo-link {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div id="puzzle"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
      ;(function () {
        'use strict'

        // ── Grid ─────────────────────────────────────────────────────────────
        var COLS = 6
        var ROWS = 2

        // ── Tile definitions ──────────────────────────────────────────────────
        var TILE_DEFS = [
          { id: 'P', src: 'Letters/P.svg', solvedPos: 0 },
          { id: 'I', src: 'Letters/I.svg', solvedPos: 1 },
          { id: 'X', src: 'Letters/X.svg', solvedPos: 2 },
          { id: 'E', src: 'Letters/E.svg', solvedPos: 3 },
          { id: 'L', src: 'Letters/L.svg', solvedPos: 4 },
          // position 5 → EMPTY (the missing black tile)
          { id: 'A', src: 'Letters/A.svg', solvedPos: 6 },
          { id: 'G', src: 'Letters/G.svg', solvedPos: 7 },
          { id: 'E2', src: 'Letters/E-red.svg', solvedPos: 8 },
          { id: 'N', src: 'Letters/N.svg', solvedPos: 9 },
          { id: 'C', src: 'Letters/C.svg', solvedPos: 10 },
          { id: 'Y', src: 'Letters/Y.svg', solvedPos: 11 }
        ]

        var SOLVED_STATE = new Array(COLS * ROWS).fill(null)
        TILE_DEFS.forEach(function (def, idx) {
          SOLVED_STATE[def.solvedPos] = idx
        })

        // ── Sizing — matches pixel-agency.html (first page) ───────────────────
        // width: min(95vw, 1080px), gap: clamp(3px, 0.6vw, 9px)
        var GAP = Math.min(9, Math.max(3, Math.round(window.innerWidth * 0.006)))
        var PUZZLE_W = Math.min(Math.round(window.innerWidth * 0.95), 1080)
        var TILE_SIZE = Math.floor((PUZZLE_W - (COLS - 1) * GAP) / COLS)
        var PUZZLE_H = ROWS * TILE_SIZE + (ROWS - 1) * GAP

        // ── Helpers ───────────────────────────────────────────────────────────
        function gridToPixel(pos) {
          return {
            x: (pos % COLS) * (TILE_SIZE + GAP),
            y: Math.floor(pos / COLS) * (TILE_SIZE + GAP)
          }
        }

        function getAdjacentPositions(pos) {
          var row = Math.floor(pos / COLS),
            col = pos % COLS,
            adj = []
          if (col > 0) adj.push(pos - 1)
          if (col < COLS - 1) adj.push(pos + 1)
          if (row > 0) adj.push(pos - COLS)
          if (row < ROWS - 1) adj.push(pos + COLS)
          return adj
        }

        // ── Shuffle ───────────────────────────────────────────────────────────
        var SHUFFLE_MOVES = 10

        function generateShuffle(numMoves) {
          var state = SOLVED_STATE.slice()
          var moves = []
          var emptyPos = state.indexOf(null)
          var prevEmpty = -1

          for (var i = 0; i < numMoves; i++) {
            var candidates = getAdjacentPositions(emptyPos).filter(function (p) {
              return p !== prevEmpty
            })
            var tilePos = candidates[Math.floor(Math.random() * candidates.length)]
            moves.push({ fromPos: tilePos, toPos: emptyPos })
            state[emptyPos] = state[tilePos]
            state[tilePos] = null
            prevEmpty = emptyPos
            emptyPos = tilePos
          }

          return { shuffledState: state, shuffleMoves: moves }
        }

        var shuffleResult = generateShuffle(SHUFFLE_MOVES)
        var shuffledState = shuffleResult.shuffledState
        var shuffleMoves = shuffleResult.shuffleMoves

        var solvingMoves = shuffleMoves
          .slice()
          .reverse()
          .map(function (m) {
            return { fromPos: m.toPos, toPos: m.fromPos }
          })

        // ── Build DOM ─────────────────────────────────────────────────────────
        var puzzleEl = document.getElementById('puzzle')
        puzzleEl.style.width = PUZZLE_W + 'px'
        puzzleEl.style.height = PUZZLE_H + 'px'

        var tileEls = TILE_DEFS.map(function (def) {
          var div = document.createElement('div')
          div.className = 'tile'
          div.id = 'tile-' + def.id
          div.style.width = TILE_SIZE + 'px'
          div.style.height = TILE_SIZE + 'px'
          var img = document.createElement('img')
          img.src = def.src
          img.alt = def.id
          div.appendChild(img)
          puzzleEl.appendChild(div)
          return div
        })

        // ── Drop targets — row 2 first, then row 1 ────────────────────────────
        // Split tiles by which ROW of the shuffled grid they occupy,
        // sort each group left-to-right by column, then concatenate
        // bottom-row group first so AGENCY (row 2) drops before PIXEL (row 1).
        var bottomTargets = []
        var topTargets = []

        for (var pos = 0; pos < COLS * ROWS; pos++) {
          var tileIdx = shuffledState[pos]
          if (tileIdx === null) continue // skip the empty slot

          var p = gridToPixel(pos)
          var target = { el: tileEls[tileIdx], finalX: p.x, finalY: p.y, col: pos % COLS }

          if (Math.floor(pos / COLS) === 1) {
            bottomTargets.push(target) // row 2 (index 1)
          } else {
            topTargets.push(target) // row 1 (index 0)
          }
        }

        // Sort each group by column so the stagger sweeps left-to-right
        function byCol(a, b) {
          return a.col - b.col
        }
        bottomTargets.sort(byCol)
        topTargets.sort(byCol)

        // Row 2 drops first, row 1 follows
        var dropTargets = bottomTargets.concat(topTargets)

        // ── Animation constants ───────────────────────────────────────────────
        var DROP_FROM = -(window.innerHeight + 300)
        var DROP_DUR = 1.37 // 1.05 × 1.3 — slowed 30 %
        var DROP_STAGGER = 0.09
        var DROP_DELAY = 0.2

        // ── Set initial state: 50% opacity, each tile above viewport ─────────
        gsap.set(tileEls, { opacity: 0.5 })

        dropTargets.forEach(function (dt) {
          gsap.set(dt.el, { x: dt.finalX, y: DROP_FROM, force3D: true })
        })

        // ── Phase 1 : Drop ────────────────────────────────────────────────────
        var dropTl = gsap.timeline({ delay: DROP_DELAY })

        dropTargets.forEach(function (dt, i) {
          dropTl.to(
            dt.el,
            {
              y: dt.finalY,
              duration: DROP_DUR,
              ease: 'bounce.out'
            },
            i * DROP_STAGGER
          )
        })

        // Landing squish
        dropTargets.forEach(function (dt, i) {
          var fireAt = DROP_DELAY + i * DROP_STAGGER + 0.64 * DROP_DUR
          gsap.fromTo(
            dt.el,
            { scaleY: 1, scaleX: 1 },
            {
              scaleY: 0.82,
              scaleX: 1.1,
              duration: 0.085, // 0.065 × 1.3 — slowed 30 %
              yoyo: true,
              repeat: 1,
              ease: 'power2.inOut',
              delay: fireAt,
              transformOrigin: 'bottom center'
            }
          )
        })

        // ── Opacity: each tile fades 50% → 100% on its own landing moment ────
        // Fired at the same time as the squish (first bounce impact ≈ 64% through
        // DROP_DUR), lasting 0.5 s so each letter independently brightens as it hits.
        dropTargets.forEach(function (dt, i) {
          var landTime = DROP_DELAY + i * DROP_STAGGER + 0.64 * DROP_DUR
          gsap.to(dt.el, {
            opacity: 1,
            duration: 0.5,
            delay: landTime,
            ease: 'power2.out'
          })
        })

        var absLastLands = DROP_DELAY + (dropTargets.length - 1) * DROP_STAGGER + DROP_DUR
        var SOLVE_PAUSE = 0.55 // gap between last landing and first solve move
        var SOLVE_START = absLastLands + SOLVE_PAUSE

        // ── Phase 2 : Solve (total = 1.3 s — slowed 30 %) ────────────────────
        var MOVE_DUR = 1.3 / SHUFFLE_MOVES // 1.3 / 10 = 0.13 s per move

        var domGrid = new Array(COLS * ROWS).fill(null)
        shuffledState.forEach(function (idx, pos) {
          if (idx !== null) domGrid[pos] = tileEls[idx]
        })

        var solveTl = gsap.timeline({ delay: SOLVE_START })

        solvingMoves.forEach(function (move) {
          var el = domGrid[move.fromPos]
          var p = gridToPixel(move.toPos)
          solveTl.to(el, { x: p.x, y: p.y, duration: MOVE_DUR, ease: 'power2.inOut' })
          domGrid[move.toPos] = el
          domGrid[move.fromPos] = null
        })

        // Completion pulse
        solveTl.to(puzzleEl, {
          scale: 1.025,
          duration: 0.325, // 0.25 × 1.3 — slowed 30 %
          ease: 'power2.out',
          yoyo: true,
          repeat: 1,
          delay: 0.2,
          transformOrigin: 'center center'
        })

        // ── Phase 3 : P and A fly to top-left corner at half size ─────────────
        // The puzzle container is centred by flexbox. To land a tile at a fixed
        // viewport position we offset its GSAP x/y by the puzzle's edge distance
        // from the viewport origin.
        var puzzleLeft = (window.innerWidth - PUZZLE_W) / 2
        var puzzleTop = (window.innerHeight - PUZZLE_H) / 2

        var CORNER_PAD = 20 // px from the viewport edges
        var HALF_TILE = TILE_SIZE * 0.5 // rendered size at scale 0.5
        var PA_GAP = 6 // gap between P and A when stacked

        // Target GSAP x/y values (tiles use transformOrigin 'top left' so these
        // correspond directly to the tile's top-left corner in viewport space)
        var cornerX = CORNER_PAD - puzzleLeft
        var cornerY_P = CORNER_PAD - puzzleTop
        var cornerY_A = CORNER_PAD + HALF_TILE + PA_GAP - puzzleTop

        var tileP = document.getElementById('tile-P')
        var tileA = document.getElementById('tile-A')

        // Bring P and A above sibling tiles during flight
        gsap.set([tileP, tileA], { zIndex: 100 })

        // All tiles that are NOT P or A fade out just before P/A begin moving
        var remainingTiles = tileEls.filter(function (el) {
          return el !== tileP && el !== tileA
        })

        // Fade starts 1.0 s after the completion pulse ends
        solveTl.to(
          remainingTiles,
          {
            opacity: 0,
            duration: 0.72, // 0.55 × 1.3 — slowed 30 %
            ease: 'power2.inOut'
          },
          '>+1.0'
        )

        // P and A begin moving 0.1 s into the fade (i.e. 0.35 s after pulse ends)
        // onStart unlocks page scroll the instant this tween fires
        solveTl.to(
          tileP,
          {
            x: cornerX,
            y: cornerY_P,
            scale: 0.5,
            transformOrigin: 'top left',
            duration: 0.91, // 0.7 × 1.3 — slowed 30 %
            ease: 'power3.inOut',
            onStart: function () {
              document.body.style.overflow = 'auto'
            }
          },
          '<+0.1'
        ) // 0.1 s after the fade tween started

        solveTl.to(
          tileA,
          {
            x: cornerX,
            y: cornerY_A,
            scale: 0.5,
            transformOrigin: 'top left',
            duration: 0.91, // 0.7 × 1.3 — slowed 30 %
            ease: 'power3.inOut',
            onComplete: function () {
              // Reparent P and A out of the puzzle container and fix them
              // to the viewport so they are immune to flexbox re-centering on resize.
              ;[tileP, tileA].forEach(function (el) {
                el.style.pointerEvents = 'auto'
                el.classList.add('logo-link')
                el.addEventListener('click', function () {
                  window.location.href = window.location.href
                })
              })

              // Calculate final fixed positions
              var fixedSize = TILE_SIZE * 0.5

              // Remove GSAP transforms and reparent to body with position:fixed
              ;[tileP, tileA].forEach(function (el, i) {
                gsap.set(el, { clearProps: 'all' })
                el.style.position = 'fixed'
                el.style.left = CORNER_PAD + 'px'
                el.style.top = (i === 0 ? CORNER_PAD : CORNER_PAD + fixedSize + PA_GAP) + 'px'
                el.style.width = fixedSize + 'px'
                el.style.height = fixedSize + 'px'
                el.style.zIndex = '10000'
                el.style.pointerEvents = 'auto'
                document.body.appendChild(el)
              })

              // Reveal the navigation menu
              var nav = document.getElementById('site-nav')
              nav.style.pointerEvents = 'auto'
              gsap.to(nav, { opacity: 1, duration: 0.5, ease: 'power2.out' })

              // Fade out the loader stage background
              var stageEl = document.querySelector('.stage')
              gsap.to(stageEl, {
                backgroundColor: 'rgba(240,239,234,0)',
                duration: 0.6,
                ease: 'power2.out',
                onComplete: function () {
                  stageEl.style.background = 'none'
                }
              })

              // Fade in the hero and scroll content
              var heroEl = document.querySelector('.hero')
              var scrollEl = document.querySelector('.scroll-content')
              gsap.to(heroEl, { opacity: 1, duration: 0.8, ease: 'power2.out' })
              gsap.to(scrollEl, { opacity: 1, duration: 0.8, delay: 0.15, ease: 'power2.out' })
            }
          },
          '<'
        ) // same start time as P
      })()
    </script>
  </body>
</html>
